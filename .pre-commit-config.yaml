repos:
  # Flake8 проверка стиля кода
  - repo: https://github.com/pycqa/flake8
    rev: '6.1.0'  # используйте актуальную версию
    hooks:
      - id: flake8
        args: [--max-line-length=119]
        exclude: ^migrations/|^venv/|^\.venv/

  # Pylint (более строгая проверка)
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args: [--fail-under=8.0]
        exclude: ^tests/|^migrations/

