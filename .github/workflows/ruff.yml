name: Ruff Linter

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff (linting) with annotations
        run: ruff check --output-format=github .

      - name: Check formatting with diff
        id: format_check
        run: |
          if ! ruff format --check --diff . > format_diff.txt 2>&1; then
            echo "FORMAT_ERROR=true" >> $GITHUB_ENV
            cat format_diff.txt
            exit 1
          fi

      - name: Show formatting suggestions
        if: env.FORMAT_ERROR == 'true'
        run: |
          echo "❌ Неправильное форматирование! Запустите локально:"
          echo "ruff format ."
          echo ""
          echo "Или примените эти изменения:"
          echo "---"
          cat format_diff.txt